<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Fake Face Detection</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  height: 100vh;
  background: radial-gradient(circle at top, #1e293b, #020617);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
}

.container {
  width: 420px;
  padding: 30px;
  border-radius: 25px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  text-align: center;
  animation: fadeIn 1s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform: translateY(20px);}
  to {opacity:1; transform: translateY(0);}
}

h1 {
  font-size: 24px;
  margin-bottom: 8px;
}

.subtitle {
  font-size: 14px;
  opacity: 0.6;
  margin-bottom: 25px;
}

.upload-box {
  border: 2px dashed rgba(255,255,255,0.2);
  padding: 35px;
  border-radius: 18px;
  cursor: pointer;
  transition: 0.3s;
  position: relative;
}

.upload-box.dragover {
  border-color: #3b82f6;
  background: rgba(59,130,246,0.1);
}

.upload-text {
  font-size: 14px;
  opacity: 0.7;
}

input {
  display: none;
}

.preview {
  margin-top: 15px;
  position: relative;
}

.preview img {
  width: 100%;
  border-radius: 12px;
}

.overlay {
  position: absolute;
  bottom: 10px;
  left: 10px;
  background: rgba(0,0,0,0.6);
  padding: 5px 10px;
  border-radius: 8px;
  font-size: 12px;
}

button {
  margin-top: 20px;
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #3b82f6, #6366f1);
  color: white;
  font-weight: 600;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 0 15px rgba(59,130,246,0.5);
}

button:hover {
  transform: scale(1.03);
  box-shadow: 0 0 25px rgba(99,102,241,0.8);
}

.loader {
  margin: 20px auto;
  width: 35px;
  height: 35px;
  border: 4px solid rgba(255,255,255,0.2);
  border-top: 4px solid #3b82f6;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  display: none;
}

@keyframes spin {
  100% {transform: rotate(360deg);}
}

.result {
  margin-top: 20px;
}

.label {
  font-size: 20px;
  font-weight: 600;
}

.confidence-bar {
  margin-top: 10px;
  height: 10px;
  width: 100%;
  background: rgba(255,255,255,0.1);
  border-radius: 10px;
  overflow: hidden;
}

.confidence-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #22c55e, #3b82f6);
  transition: width 0.5s ease;
}

.confidence-text {
  font-size: 12px;
  margin-top: 5px;
  opacity: 0.7;
}

</style>
</head>

<body>

<div class="container">
  <h1>AI Fake Face Detection</h1>
  <div class="subtitle">Upload an image to detect authenticity</div>

  <label class="upload-box" id="dropArea">
    <div class="upload-text">Drag & Drop or Click</div>
    <input type="file" id="fileInput" accept="image/*">
  </label>

  <div class="preview" id="preview"></div>

  <button onclick="uploadImage()">Analyze Image</button>

  <div class="loader" id="loader"></div>

  <div class="result">
    <div class="label" id="resultLabel"></div>
    <div class="confidence-bar">
      <div class="confidence-fill" id="confidenceFill"></div>
    </div>
    <div class="confidence-text" id="confidenceText"></div>
  </div>
</div>

<script>
const input = document.getElementById("fileInput");
const preview = document.getElementById("preview");
const dropArea = document.getElementById("dropArea");

input.addEventListener("change", showPreview);

dropArea.addEventListener("dragover", (e) => {
  e.preventDefault();
  dropArea.classList.add("dragover");
});

dropArea.addEventListener("dragleave", () => {
  dropArea.classList.remove("dragover");
});

dropArea.addEventListener("drop", (e) => {
  e.preventDefault();
  dropArea.classList.remove("dragover");
  input.files = e.dataTransfer.files;
  showPreview();
});

function showPreview() {
  const file = input.files[0];
  preview.innerHTML = "";

  if (file) {
    const img = document.createElement("img");
    img.src = URL.createObjectURL(file);

    const overlay = document.createElement("div");
    overlay.className = "overlay";
    overlay.innerText = file.name;

    preview.appendChild(img);
    preview.appendChild(overlay);
  }
}

async function uploadImage() {
  const file = input.files[0];
  if (!file) return alert("Upload image first");

  const loader = document.getElementById("loader");
  loader.style.display = "block";

  let formData = new FormData();
  formData.append("file", file);

  try {
    let res = await fetch("http://127.0.0.1:5000/predict", {
      method: "POST",
      body: formData
    });

    let data = await res.json();

    loader.style.display = "none";

    // Example response: {result: "Fake", confidence: 87}
    document.getElementById("resultLabel").innerText = data.result;

    document.getElementById("confidenceFill").style.width = data.confidence + "%";
    document.getElementById("confidenceText").innerText =
      data.confidence + "% confidence";

  } catch {
    loader.style.display = "none";
    alert("Server error");
  }
}
</script>

</body>
</html>
